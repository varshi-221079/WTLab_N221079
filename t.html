<!DOCTYPE html>
<html>
<head>
    <title>Online Group Discussion</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1>ONLINE GROUP DISCUSSION</h1>

<header class="header">
    <label>Topic Name:</label>
    <input type="text" id="topicogd3" placeholder="Enter topic name">
</header>

<!-- GRID LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h3>Participants</h3>
        <ul>
            <li>User1</li>
            <li>User2</li>
            <li>User3</li>
        </ul>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <h2>Discussion Area</h2>
        <div class="message">User1: Welcome to discussion</div>
        <div class="message">User2: Let's start</div>

        <!-- MESSAGE FORM -->
        <form class="chat-form">
            <input type="text" placeholder="Type your message">
            <button type="submit">Send</button>
        </form>
    </main>

</div>

<!-- FOOTER BUTTONS -->
<footer class="footer">
    <div class="btn-container">
        <button class="raise">Raise Hand</button>
        <button class="mute">Mute</button>
        <button class="message-btn">Message</button>
        <button class="leave">Leave Discussion</button>
    </div>
</footer>
