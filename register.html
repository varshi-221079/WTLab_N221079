<html>
 <head>
  <title>Register</title> </head>
   <body> 
   <h2>user Registration</h2>
    <!--<form action="register.php" method="post">--> 
    <form id="registerform">
     username:<input type="text" name="username" required><br><br>
     Email:<input type="email" name="email" required><br><br> 
     password:<input type="password" name="password" required><br><br> 
     <button type="submit">Register</button> </form>
     <script> 
     document.querySelector("form").addEventListener("submit", async function(e){ e.preventDefault();
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value; 
      const password = document.getElementById("password").value; 
      const res = await fetch("http://localhost:5000/api/users/register", { method: "POST", headers: { "Content-      Type":"application/json" }, body: JSON.stringify({ name, email, password }) }); 
      const data = await res.json(); alert(data.message); 
      if(data.message === "User registered successfully")
      { window.location.href = "login.html"; } }); 
      </script> 
      </body> 
      </html>
