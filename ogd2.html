<html>
<head>
  <link rel="stylesheet" type="text/css" href="ogd2.css">
<style>
h1
{
    background-color: blue;
}
</style>
</head>
<body>
<h1 align="center">ONLINE GROUP DISCUSSION</h1>
<div style="background-color:white;height:200px;" class="class1">
  <br>
  <tr>
    <td>
    <label for="today topic">TODAY TOPIC NAME:</label>
    <input type="text" size="50" id="todaytopic" name="today topic" placeholder="enter today topic name">
    </td>
    &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp
    <td>
    <img src="images/clock.png" height="30" width="30">
    <label for="time">TIME:</label>
    <input type="text" size="20" name="time" placeholder="enter time">
    </td>
    &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp
    <td>
      <button style="background-color:bisque;" id="handrise" onclick="increasecount()">
        <img src="images/thumb.png " width=30 height="30">
        <span id="participantcount">0</span>
      </button>
    </td>
    </tr>
    <br>
    <br>
    <br>
    <h3>You Can Select Topic</h3>
<tr>
    <td>
        <label>TECHNOLOGY</label>
        <select id="selecttechtopic">
            <option VALUE="quantum technology">quantum technology</option>
            <option VALUE="cyber security">cyber security</option>
            <option VALUE="cryptocurrency">cryptocurrency</option>
            
        </select>
    </td>
    &nbsp &nbsp &nbsp &nbsp;
    <td>
        <label>GAMES</label>
        <select id="selectgametopic">
            <option VALUE="cricket" selected>cricket</option>
            <option VALUE="volleyball">volleyball</option>
            <option VALUE="chess">chess</option>
        </select>
    </td>
    &nbsp &nbsp &nbsp &nbsp;
    <td>
        <label>movies</label>
        <select id="selectmovietopic">
            <option VALUE="cricket" selected>cricket</option>
            <option VALUE="volleyball">volleyball</option>
            <option VALUE="chess">chess</option>
        </select>
    </td>
    </tr>
</div>
<br>
<div style="background-color:white;height:100px;" class="class2">
  <br>
  <br>
  <tr>
    <td>
    <label for="Participant Name">Participant Name:</label>
    <input type="text" size="30" id="participantname" name="Participant Name" placeholder="enter your name">
    </td>
    &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp
      <td>
      <label for="role">Enter Your Role:</label>
      <input type="text" size="30" id="participantrole" name="role" placeholder="participant/listener">
      </td>
  </tr>

</div>
<br>
<div style="background-color:white;height:200;" class="class3">
  <br>
  <h2 align="left"><pre>   GD RULES:</pre></h2>
  <li>
  <item>  No interuption</item>
  </li>
  <li>
  <item>  Speak with in time limit</item>
  </li>
  <li>
  <item> Raise hand before speaking</item>
  </li>
  <br>
  <center><a href="ogd3.html"><button style="background-color:green; height:30;width:150;" onmouseover="joingd()">Join Discussion</button></a><center>
</div>
<script src="JS/varibles.js"></script>
</body>
</html>
